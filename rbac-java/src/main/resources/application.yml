server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tx_ticket?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      auto-commit: true
      idle-timeout: 30000
      pool-name: DateSourceHikari
      max-lifetime: 1800000
      connection-timeout: 30000

  main:
    banner-mode: off

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-share: true
  token-style: uuid
  is-log: false

# MyBatis-Plus 配置
mybatis-plus:
  type-aliases-package: com.rbac.base.modules.**.entity
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underline-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
